<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-2 px-md-4" dir="ltr">
  <div class="container-fluid">
    
    <!-- لوجو الـ CRM -->
    <a class="navbar-brand fw-bold d-flex align-items-center" routerLink="/crm/dashboard">
      <i class="bi bi-graph-up-arrow text-danger me-2 fs-3"></i>
      <span class="fs-4">BETK <span class="text-danger">CRM</span></span>
    </a>

    <div class="d-flex align-items-center gap-4 ms-auto">
      
      <!-- زرار العودة للموقع الأصلي -->
      <a routerLink="/home" class="btn btn-outline-light btn-sm rounded-pill fw-bold px-4 py-2 d-none d-sm-block">
        <i class="bi bi-globe me-1"></i> Main Website
      </a>

      <!-- الإشعارات (Notifications Bell) -->
      <div class="dropdown mt-1">
        <a class="nav-link text-white position-relative d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown" style="cursor: pointer;">
          <i class="bi bi-bell-fill fs-4"></i> 
          <span *ngIf="notifications().length > 0" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow-sm" style="font-size: 0.7rem;">
            {{ notifications().length }}
          </span>
        </a>
        
        <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0" style="width: 350px; max-height: 400px; overflow-y: auto;">
          <li><h6 class="dropdown-header fw-bold text-danger border-bottom pb-2 mb-2 fs-6">
            <i class="bi bi-clock-history me-1"></i> Today's Reminders
          </h6></li>
          
          <li *ngIf="notifications().length === 0"><span class="dropdown-item text-muted small py-3 text-center">No pending reminders. Relax! 🎉</span></li>
          
          <li *ngFor="let notif of notifications()">
            <a class="dropdown-item border-bottom py-2 text-wrap" [routerLink]="['/crm/leads', notif.leadId]">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <strong class="small text-truncate text-dark" style="max-width: 150px;">
                  <i class="bi bi-person-circle me-1"></i> {{ notif.leadName }}
                </strong>
                
                <!-- 🟢 ألوان وأيقونات على حسب النوع -->
                <span class="badge" 
                      [ngClass]="{
                        'bg-warning text-dark': notif.type === 'Call',
                        'bg-info text-dark': notif.type === 'Meeting',
                        'bg-success': notif.type === 'Visit',
                        'bg-secondary': notif.type === 'Email'
                      }" style="font-size: 0.65rem;">
                  <i class="bi" 
                     [ngClass]="{
                        'bi-telephone': notif.type === 'Call',
                        'bi-people': notif.type === 'Meeting',
                        'bi-geo-alt': notif.type === 'Visit',
                        'bi-envelope': notif.type === 'Email'
                     }"></i> 
                  {{ notif.type }}
                </span>
              </div>
              <div class="text-muted" style="font-size: 0.8rem; line-height: 1.3;">{{ notif.summary }}</div>
              
              <!-- الوقت يظهر باللون الأحمر عشان يلفت الانتباه -->
              <div class="text-danger mt-2 fw-bold" style="font-size: 0.75rem;">
                <i class="bi bi-alarm me-1"></i> {{ notif.date | date:'shortTime' }}
              </div>
            </a>
          </li>
        </ul>
      </div>

      <!-- خط فاصل شيك بين الإشعارات والبروفايل -->
      <div class="vr text-white opacity-25 d-none d-md-block" style="width: 2px; height: 35px;"></div>

      <a routerLink="/crm/profile" class="text-white text-decoration-none d-flex align-items-center gap-2" title="My Profile" style="cursor: pointer;">
        <img [src]="brokerImage()" class="rounded-circle shadow-sm" style="width: 42px; height: 42px; object-fit: cover;">
        <span class="fw-bold d-none d-md-block fs-6">{{ brokerName() }}</span>
      </a>

      <!-- زرار تسجيل الخروج -->
      <a href="javascript:void(0)" (click)="logout()" class="text-danger text-decoration-none d-flex align-items-center" title="Logout" style="cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <i class="bi bi-box-arrow-right fs-3"></i>
      </a>

    </div>
  </div>
</nav>
