<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0 p-4" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-4">
  <div class="text-center mb-4">
  <img src="logo.jpeg" alt="Betk Logo" style="max-width: 180px;" class="mb-2">
  <p class="text-muted small">Your Gateway to a Better Home</p>
</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" formControlName="email" class="form-control form-control-lg rounded-3" placeholder="name@example.com">
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger small mt-1">
          Please enter a valid email.
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label fw-semibold mb-0">Password</label>
          <!-- 🟢 الرابط الجديد -->
          <a routerLink="/forgot-password" class="text-danger small fw-bold text-decoration-none">Forgot Password?</a>
        </div>
        <input type="password" formControlName="password" class="form-control form-control-lg rounded-3 mt-2" placeholder="">
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-danger btn-lg w-100 rounded-pill mb-3">
        Login
      </button>

      <div class="text-center">
        <span class="text-muted">Don't have an account? </span>
        <a routerLink="/register" class="text-danger fw-bold text-decoration-none fs-4">Sign Up</a>
      </div>
    </form>
  </div>
</div>
