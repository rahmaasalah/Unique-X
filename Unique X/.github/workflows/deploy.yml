name: Deploy to Contabo

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: "./Unique X"
          file: "./Unique X/Dockerfile"
          push: true
          tags: rahma324ssalah/unique-x-backend:latest
          no-cache: true

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: "./Unique X/frontend/UniqueXApp"
          file: "./Unique X/frontend/UniqueXApp/Dockerfile"
          push: true
          tags: rahma324ssalah/unique-x-frontend:latest
          no-cache: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/unique-x
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" > .env
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            echo "JWT_KEY=${{ secrets.JWT_KEY }}" >> .env
            docker compose pull
            docker compose down
            docker compose up -d
            sleep 5
            docker exec unique-x-frontend sh -c 'cat > /etc/nginx/conf.d/default.conf << EOF
            server {
                listen 80;
                listen [::]:80;
                server_name localhost;
                location / {
                    root /usr/share/nginx/html;
                    index index.html index.htm;
                    try_files \$uri \$uri/ /index.html;
                }
            }
            EOF'
            docker exec unique-x-frontend nginx -s reload
