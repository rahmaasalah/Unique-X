name: Deploy to Contabo

on:
  push:
    branches:
      - master # لو البرانش بتاعك اسمه master غيري الكلمة دي لـ master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: "./Unique X"
          file: "./Unique X/Dockerfile"
          push: true
          tags: rahma324ssalah/unique-x-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: "./Unique X/frontend/UniqueXApp"
          file: "./Unique X/frontend/UniqueXApp/Dockerfile"
          push: true
          tags: rahma324ssalah/unique-x-frontend:latest

 deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/unique-x
            docker compose pull
            docker compose down
            docker compose up -d
            
            docker compose pull
            docker compose down
            docker compose up -d
